# 社区老年人健康智能管理系统 - 主配置
# 本地开发请配合 application-dev.yml 或下方默认值使用

spring:
  application:
    name: elderly-health-backend
  profiles:
    active: dev

  # MySQL（可通过环境变量覆盖）
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:elderly_health}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis 7.x（地址与库索引可按环境调整）
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# JWT 双 Token（与后续 Security 配置一致）
jwt:
  secret: ${JWT_SECRET:elderly-health-jwt-secret-key-change-in-production-min-256-bits-required-for-hs512}
  access-token-expire-minutes: ${JWT_ACCESS_EXPIRE_MINUTES:120}
  refresh-token-expire-days: ${JWT_REFRESH_EXPIRE_DAYS:7}
  issuer: elderly-health-system

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 3000

assessment:
  remote-url: http://127.0.0.1:19998

logging:
  level:
    root: INFO
    com.health: DEBUG
