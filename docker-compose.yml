version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: elderly-health-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-elderly2024}
      MYSQL_DATABASE: elderly_health
      MYSQL_USER: healthuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-elderly2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-elderly2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - health-net

  redis:
    image: redis:7-alpine
    container_name: elderly-health-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - health-net

  backend:
    image: zxseric/eric-elderly-health-backend:latest
    container_name: elderly-health-backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: elderly_health
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-elderly2024}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-elderly-health-jwt-secret-key-change-in-production-min-256-bits-required-for-hs512}
      SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - health-net

  frontend:
    image: zxseric/eric-elderly-health-frontend:latest
    container_name: elderly-health-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - health-net

volumes:
  mysql_data:
  redis_data:

networks:
  health-net:
    driver: bridge
